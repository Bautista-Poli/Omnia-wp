<menu-admin></menu-admin>

<div class="slot-manager" [class.panel-open]="draft !== null">

  <div class="grid-area">

    <div class="grid-header">
      <h2 class="grid-title">Gestión de Slots</h2>
      <div class="grid-actions">
        <button class="btn-ghost" (click)="showNewHoraInput = !showNewHoraInput">
          ＋ Nueva hora
        </button>
      </div>
    </div>

    @if (showNewHoraInput) {
      <div class="new-hora-bar">
        <input class="hora-input"
               [(ngModel)]="newHoraValue"
               placeholder="ej: 21:00:00"
               (keydown.enter)="addNewHoraRow()" />
        <button class="btn-confirm" (click)="addNewHoraRow()">Agregar hora</button>
        <button class="btn-cancel" (click)="showNewHoraInput = false">✕</button>
      </div>
    }

    @if (isGridLoading) {
      <div class="grid-loading">Cargando grilla…</div>
    } @else {
      <div class="table-scroll">
        <table class="schedule-table">
          <thead>
            <tr>
              <th class="th-hora">Hora</th>
              <th *ngFor="let dia of scheduleDias">{{ dia }}</th>
            </tr>
          </thead>
          <tbody>
            <ng-container *ngFor="let row of rows; let rowIdx = index">
              <tr *ngFor="let subRow of getExpandedRows(rowIdx); let first = first">

                <!-- Sin botón "+" en la columna hora -->
                <td class="td-hora">
                  <span *ngIf="first">{{ row.hora }}</span>
                </td>

                <td *ngFor="let cell of subRow; let diaIdx = index"
                    class="td-cell"
                    [class.occupied]="!!cell"
                    [class.empty]="!cell"
                    (click)="!cell && openAddPanel(rowIdx, diaIdx)">

                  @if (cell) {
                    <!-- Celda ocupada: ✕ eliminar + ＋ agregar sibling -->
                    <div class="cell-body">
                      <span class="cell-class">{{ cell.name }}</span>
                      <button class="btn-delete"
                              (click)="deleteCell($event, cell)"
                              title="Eliminar">✕
                      </button>
                      <button class="btn-add-sibling"
                              (click)="addSibling($event, cell)"
                              title="Agregar otra clase en este día y horario">＋
                      </button>
                    </div>
                  } @else {
                    <!-- Celda vacía: clic abre panel -->
                    <div class="cell-add-hint">＋</div>
                  }

                </td>
              </tr>
            </ng-container>
          </tbody>
        </table>
      </div>
    }
  </div>

  @if (draft) {
    <aside class="side-panel">

      <div class="panel-header">
        <div class="panel-meta">
          <span class="panel-dia">{{ draft.diaNombre }}</span>
          <span class="panel-hora">{{ draft.hora }}</span>
        </div>
        <button class="panel-close" (click)="closeDraft()">✕</button>
      </div>

      <div class="panel-body">

        <div class="field">
          <label>Día</label>
          <select [(ngModel)]="draft.dia"
                  (ngModelChange)="draft!.diaNombre = scheduleDias[$event - 1]">
            <option *ngFor="let d of scheduleDias; let i = index" [ngValue]="i + 1">
              {{ d }}
            </option>
          </select>
        </div>

        <div class="field">
          <label>Horario</label>
          <input type="text" [(ngModel)]="draft.hora" placeholder="HH:mm:ss" />
        </div>

        <div class="field">
          <label>Clase</label>
          <select [(ngModel)]="draft.className">
            <option *ngFor="let c of clases" [value]="c">{{ c }}</option>
          </select>
        </div>

        <div class="field">
          <label>Profesor principal</label>
          <select [(ngModel)]="draft.profesorName">
            <option *ngFor="let p of profesores" [value]="p">{{ p }}</option>
          </select>
        </div>

        <div class="field">
          <label>Segundo profesor <span class="optional">(opcional)</span></label>
          <select [(ngModel)]="draft.profesorName2">
            <option value="">(ninguno)</option>
            <option *ngFor="let p of profesores" [value]="p">{{ p }}</option>
          </select>
        </div>

      </div>

      <div class="panel-footer">
        <button class="btn-add" (click)="confirmAdd()" [disabled]="isSaving">
          {{ isSaving ? 'Guardando…' : '＋ Agregar slot' }}
        </button>
        <button class="btn-cancel-panel" (click)="closeDraft()" [disabled]="isSaving">
          Cancelar
        </button>
      </div>

    </aside>
  }

</div>

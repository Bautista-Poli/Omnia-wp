<menu-admin></menu-admin>

<div class="gym-class-management">
  <div id="titulo">
    <h2>Eliminar Clases</h2>
    <mat-icon>list_alt</mat-icon>
  </div>

  @if (successMsg) { <div class="alert success">✓ {{ successMsg }}</div> }
  @if (errorMsg) { <div class="alert error">✕ {{ errorMsg }}</div> }

  <button type="button" class="btn-secondary" (click)="reloadClases()" [disabled]="loadingList || deletingId !== null">
    ↻ Refrescar lista
  </button>

  @if (loadingList) {
    <div class="loading">Cargando clases...</div>
  } @else {
    <div class="class-grid">
      <div class="class-card" *ngFor="let c of clases">
        <img class="class-img" [src]="c.src" [alt]="c.name" (error)="onImgError($event)" />

        <div class="class-info">
          <div class="class-name">{{ c.name }}</div>
        </div>

        <button type="button"
                class="btn-danger class-del"
                (click)="removeClase(c)"
                [disabled]="deletingId === c.id">
          {{ deletingId === c.id ? 'Eliminando...' : 'Eliminar' }}
        </button>
      </div>
    </div>

    @if (!clases.length) {
      <div class="empty">No hay clases cargadas.</div>
    }
  }
</div>

<!-- reseñas.component.html (o donde lo uses) -->
<div class="reseñas reviews-grid">
  <figure class="snip1157" *ngFor="let r of reviews">
    <blockquote>
      <div class="card-header">
        <img [src]="r.imgUrl" [alt]="r.nameKey" loading="lazy" decoding="async" />
        <div class="author">
          <h5>{{ r.nameKey }}</h5>
        </div>
      </div>

      <div class="quote-text">
        <ng-container *ngFor="let key of (r.quoteKeys || r.commentKeys)">
          <span>{{ key | translate }}</span>
        </ng-container>
      </div>

      <div class="stars">
        <i class="fa fa-star" aria-hidden="true"></i>
        <i class="fa fa-star" aria-hidden="true"></i>
        <i class="fa fa-star" aria-hidden="true"></i>
        <i class="fa fa-star" aria-hidden="true"></i>
        <i class="fa fa-star" aria-hidden="true"></i>
      </div>

      <div class="arrow"></div>
    </blockquote>
  </figure>
</div>

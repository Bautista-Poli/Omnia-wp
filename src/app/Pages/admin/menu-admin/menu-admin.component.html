<nav class="admin-nav">
  <div class="nav-container">

    <!-- Links principales -->
    <div *ngFor="let item of items; let i = index" class="nav-group">
      <button
        class="nav-btn"
        [routerLink]="item.link"
        routerLinkActive="active-link"
        (click)="setActive(i)"
      >
        <span class="icon">{{ item.icon }}</span>
        <span class="label">{{ item.label }}</span>
      </button>
    </div>

    <!-- Logout separado -->
    <div class="nav-group logout-group">
      <button class="nav-btn logout-btn" (click)="logout()">
        <span class="icon">🚪</span>
        <span class="label">Logout</span>
      </button>
    </div>

  </div>

  <div class="sub-nav-container" *ngIf="items[activeIndex]?.children">
    <div class="sub-nav-content">
      <a *ngFor="let child of items[activeIndex].children"
         [routerLink]="child.link"
         routerLinkActive="sub-active"
         class="sub-btn">
        {{ child.icon }} {{ child.label }}
      </a>
    </div>
  </div>
</nav>
